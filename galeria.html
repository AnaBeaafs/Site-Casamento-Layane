        { src: "assets/images/prewedding/pre32.JPG", category: "prewedding" },
        { src: "assets/images/prewedding/pre33.JPG", category: "prewedding" },
    ];

    const galleryGrid = document.getElementById('galleryGrid');
    const emBreve = document.getElementById('emBreve');
    let currentFilter = 'prewedding';

    function getRandomHeightClass() {
        const rand = Math.random();
        if (rand < 0.35) return 'tall';
        if (rand < 0.70) return 'short';
        return '';
    }

    function renderGallery(filteredPhotos) {
        galleryGrid.innerHTML = '';

        if (filteredPhotos.length === 0) {
            galleryGrid.style.display = 'none';
            emBreve.classList.add('visivel');
        } else {
            galleryGrid.style.display = 'block';
            emBreve.classList.remove('visivel');
            
            filteredPhotos.forEach(photo => {
                const div = document.createElement('div');
                div.className = `masonry-item ${getRandomHeightClass()}`;
                div.innerHTML = `<img src="${photo.src}" alt="">`;
                div.onclick = () => showModal(photo.src);
                galleryGrid.appendChild(div);
            });
        }
    }

    function filterGallery(filter) {
        currentFilter = filter;
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.classList.toggle('active', btn.getAttribute('data-filter') === filter);
        });

        const filtered = filter === 'all' ? photos : photos.filter(photo => photo.category === filter);
        renderGallery(filtered);
    }

    // Inicializa
    renderGallery(photos.filter(p => p.category === 'prewedding'));

    // Event listeners
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            filterGallery(btn.getAttribute('data-filter'));
        });
    });

    function showModal(src) {
        document.getElementById('modalImage').src = src;
        new bootstrap.Modal(document.getElementById('photoModal')).show();
    }
</script>
