    <!-- Modal -->
    <div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true">

        <div class="modal-body text-center pb-4" style="font-family:'Playfair Display', serif; font-size:1.05rem; color:#222;">
            <div id="modalNome" class="mb-2 fw-bold"></div>

        </div>
        <div class="modal-footer justify-content-center" style="border-top: none;">

    <!-- Canvas Confetes -->
    <canvas id="confettiCanvas" style="position:fixed; inset:0; pointer-events:none; z-index:2000; display:none;"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <script>
    // ============== EMAILJS ==============
    const PUBLIC_KEY = "MtOVefqW0iXUwD8xO";
    emailjs.init(PUBLIC_KEY);

    async function enviarEmailConfirmacao(nomeConvidado) {
        const SERVICE_ID = "service_yhqj17q";
        const TEMPLATE_ID = "template_w4dokuj";

        const params = {
            convidado: nomeConvidado,
            status: "Confirmado",
            para_email: "confrimacaolayane@gmail.com",
            data: new Date().toLocaleString('pt-BR')
        };

        try {
            const response = await emailjs.send(SERVICE_ID, TEMPLATE_ID, params);
            console.log("✅ EMAIL ENVIADO COM SUCESSO!", response);
            return response;
        } catch (error) {
            console.error("❌ ERRO AO ENVIAR EMAIL:", error);
            return null;
        }
    }

    // ============== LOCALSTORAGE - CONFIRMADOS (CORRIGIDO) ==============
    const STORAGE_KEY = 'confirmados_casamento';
    let confirmados = new Set();

    function carregarConfirmados() {
        try {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                confirmados = new Set(JSON.parse(saved));
                console.log("✅ Confirmados carregados:", Array.from(confirmados));
            } else {
                console.log("ℹ️ Nenhum confirmado salvo ainda.");
            }
        } catch (e) {
            console.error("❌ Erro ao carregar confirmados:", e);
            confirmados = new Set();
        }
    }

    function salvarConfirmados() {
        try {
            const arrayConfirmados = Array.from(confirmados);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(arrayConfirmados));
            console.log("💾 Confirmados salvos com sucesso:", arrayConfirmados);
        } catch (e) {
            console.error("❌ Erro ao salvar confirmados no localStorage:", e);
        }
    }

    // Carrega ao iniciar a página
    carregarConfirmados();

    // ============== RESTO DAS FUNÇÕES ==============
    const listaConvidados = [
        "Danieli","Rafael","Filipe","Jeane","Gustavo","Giovanna","Marianna (criança)","Edson","Kauan","Nelsina","Nino","Cleide","Miria","Bruno","Davi (criança)","Cleuza","Jhulia","Jhonatan","Lucas","Adilson","Rosicler","Charles","Leandro","Tamires","Isabela (criança)","Olívia (criança)","Zilda","José Paulo","Daiane","Fabiano","Miguel (criança)","Alice (criança)","Jessica","José Augusto","Aldenir Luis","Manuel Santos","Susana","Isabelly","Arthur","Ana Beatriz","Vitor","Stephani","Marcio","Guilherme","Regiane","Valdomiro","Elisson","Jose","Noemy","Yngrid","Yasmin","Regiane","Diego","Elias","Jó","Mirella","Kethelyn","Fabrício Petroceli","Alisson Cardeal","Lidiane","Andre","Karen","Kaio","Eidi","Henrique","Miguel","Ana Veloso","Lara","Gabriela","Samuel","Erica","José Anchieta","Anderson","Ivete","Marcos","Murillo","Leia","Ana Julia","Thiago","Luciene","Everton","Gabriel","Alice Abreu","Mariah Abreu","Vania","Gabrielle","Fabricio","Evelyn","Daniel","Louise","Edmilson","Rachel","Jessica","Alice","Maia","Alex","Yasmin","Kaun","Franciele","Giuliane","Maria Flor (criança)","Filipi","Manuele","Priscila","Miguel","Giovana","Eloa","Edilza","Henrique","Eduarda Liz","Jonatas","Teresa","Edinilza","Lorival","Edna","Edmilson Souza","Glaucia","Renan","Cecília","Thomas","Beatriz lira","Carlos","Edvandro","Rose Silva","Alessandro","Daniel Sorana","Danilo Sorana","Adriele","Heitor","Natan","Nathalia","Samira","Felipe Albuquerque","Carlinho","Martha","Jonas","Claudia","Davi","Stefanie","Ana Clara","Isabela","Giulia","Terezinha","Alisson","Clarinha","Nicolas"
    ].map(n => n.toUpperCase());

    const normalize = (s) => s.toString().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim().toUpperCase();

    const mensagensBase = [
        "Que bom saber que você vem — estamos contando os dias.",
        "Ansiosos para celebrar com você.",
        "Sua presença ilumina nosso grande dia.",
        "Obrigado por confirmar — te esperamos com carinho."
    ];
    const pickMsg = () => mensagensBase[Math.floor(Math.random() * mensagensBase.length)];

    const input = document.getElementById('nomeInput');
    const ul = document.getElementById('sugestoesLista');
    const resultado = document.getElementById('resultado');
    const feedbackEnvio = document.getElementById('feedbackEnvio');

    const setInfo = (msg) => { resultado.style.color = '#222'; resultado.textContent = msg; };
    const setWarn = (msg) => { resultado.style.color = '#6e6e6e'; resultado.textContent = msg; };

    function renderSugestoes(query) {
        const q = normalize(query);
        const resultados = q ? listaConvidados.filter(n => normalize(n).startsWith(q)) : [];
        if (!resultados.length) { 
            ul.style.display = 'none'; 
            ul.innerHTML = ''; 
            return; 
        }
        ul.innerHTML = resultados.map(nome => {
            const isConf = confirmados.has(normalize(nome));
            const liStyle = isConf ? 'color:#777;text-decoration:line-through;opacity:.75;' : 'color:#222;';
            return `<li data-nome="${nome}" style="padding:12px; cursor:pointer; ${liStyle}">${nome}</li>`;
        }).join('');
        ul.style.display = 'block';
    }

    ul.addEventListener('click', (e) => {
        const li = e.target.closest('li');
        if (!li) return;
        input.value = li.getAttribute('data-nome');
        ul.style.display = 'none';
    });

    document.addEventListener('click', (e) => {
        if (!e.target.closest('.mx-auto')) ul.style.display = 'none';
    });

    input.addEventListener('input', () => renderSugestoes(input.value));

    function confirmarPresenca() {
        const nome = input.value.trim().toUpperCase();
        
        if (!nome) { 
            setWarn('Por favor, digite seu nome.'); 
            return; 
        }
        if (!listaConvidados.includes(nome)) { 
            setWarn('Nome não encontrado na lista.'); 
            return; 
        }

        const nomeNormalizado = normalize(nome);
        confirmados.add(nomeNormalizado);
        salvarConfirmados();           // ← Salva aqui

        setInfo('Presença confirmada.');
        
        document.getElementById('modalNome').textContent = nome;
        document.getElementById('modalMensagem').textContent = pickMsg();

        const modal = new bootstrap.Modal(document.getElementById('confirmModal'));
        modal.show();

        startConfetti(1400);
        renderSugestoes(input.value);

        enviarEmailConfirmacao(nome)
            .then(() => feedbackEnvio.textContent = '✅ Confirmação enviada para a noiva.')
            .catch(() => feedbackEnvio.textContent = '⚠️ Não foi possível enviar o email.');
    }

    // ============== CONFETTI ==============
    const confettiCanvas = document.getElementById('confettiCanvas');
    const ctx = confettiCanvas.getContext('2d');
    let confettiParticles = [];
    let rafId = null;

    function resizeCanvas() {
        confettiCanvas.width = window.innerWidth;
        confettiCanvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function createConfetti(count = 120) {
        const colors = ['#b498ee', '#7965a5', '#cfc6e9', '#d7d0ec'];
        confettiParticles = Array.from({ length: count }).map(() => ({
            x: Math.random() * confettiCanvas.width,
            y: Math.random() * confettiCanvas.height - 100,
            r: 2 + Math.random() * 4,
            c: colors[Math.floor(Math.random() * colors.length)],
            s: 1 + Math.random() * 3,
            a: Math.random() * Math.PI * 2,
            va: 0.02 + Math.random() * 0.05
        }));
    }

    function drawConfetti() {
        ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
        confettiParticles.forEach(p => {
            p.y += p.s;
            p.x += Math.sin(p.a) * 1.2;
            p.a += p.va;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = p.c;
            ctx.fill();
        });
        confettiParticles = confettiParticles.filter(p => p.y < confettiCanvas.height);
        if (confettiParticles.length > 0) rafId = requestAnimationFrame(drawConfetti);
    }

    function startConfetti(duration = 1400) {
        confettiCanvas.style.display = 'block';
        createConfetti(150);
        drawConfetti();
        setTimeout(() => {
            cancelAnimationFrame(rafId);
            confettiCanvas.style.display = 'none';
        }, duration);
    }

    // ============== OUTROS SCRIPTS ==============
    </script>

    <script>
        window.addEventListener('scroll', () => {
            const nav = document.getElementById('mainNav');
            if (window.scrollY > 80) nav.classList.add('scrolled');
            else nav.classList.remove('scrolled');
        });
    </script>
    <script>
    const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry, index) => {
            if (entry.isIntersecting) {
                setTimeout(() => {
                    entry.target.classList.add('visible');
                }, index * 150);
            }
        });
    }, {
        threshold: 0.15,
        rootMargin: "0px 0px -50px 0px"
    });

    document.querySelectorAll('.animate-on-scroll').forEach(el => {
        observer.observe(el);
    });
    </script>
