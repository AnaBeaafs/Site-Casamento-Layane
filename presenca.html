    <div class="container min-vh-100 d-flex flex-column justify-content-center animate-on-scroll">
        <div class="text-center">
            <h2 class="display-5 fw-bold text-dark mb-2" style="font-family: 'Playfair Display', serif;">Digite seu nome.</h2>
            <p class="text-muted mb-5" style="font-family: 'Playfair Display', serif; font-size: 1.1rem;">
                Pedimos que confirme o mais rápido que puder,<br>assim que tiver certeza!
            </p>

            <div class="mx-auto" style="max-width: 420px; position: relative;">
                <input type="text" id="nomeInput" 
                       class="form-control form-control-lg text-center border-0 border-bottom border-2 border-dark rounded-0 py-3 fs-4"
                       placeholder="Seu nome completo" autocomplete="off">

                <ul id="sugestoesLista" class="list-unstyled"></ul>

                <button id="btnConfirmar" 
                        class="btn btn-outline-dark btn-lg px-5 py-3 mt-4 rounded-pill w-100">
                    Confirmar Presença
                </button>
            </div>

            <div id="resultado" class="mt-4 fs-5" style="font-family: 'Playfair Display', serif;"></div>
            <div id="feedbackEnvio" class="mt-2 small text-muted"></div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="confirmModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" style="border-radius:12px;">
                <div class="modal-header" style="border-bottom: none;">
                    <h5 class="modal-title" style="font-family:'Playfair Display', serif;">Presença confirmada</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center pb-4" style="font-family:'Playfair Display', serif; color:#222;">
                    <div id="modalNome" class="mb-2 fw-bold"></div>
                    <div id="modalMensagem" class="text-muted"></div>
                </div>
                <div class="modal-footer justify-content-center" style="border-top: none;">
                    <button type="button" class="btn btn-outline-dark rounded-pill px-4" data-bs-dismiss="modal">Ok</button>
                </div>
            </div>
        </div>
    </div>

    <canvas id="confettiCanvas" style="position:fixed; inset:0; pointer-events:none; z-index:2000; display:none;"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script>
        // ============== CONFIGURAÇÕES ==============
        const PUBLIC_KEY = "MtOVefqW0iXUwD8xO";
        emailjs.init(PUBLIC_KEY);

      const firebaseConfig = {
        apiKey: "AIzaSyDIs2-m3OWreSZULYprAioLbmN4N22hoXQ",
        authDomain: "presenca-layane-e-dainel.firebaseapp.com",
        projectId: "presenca-layane-e-dainel",
        storageBucket: "presenca-layane-e-dainel.firebasestorage.app",
        messagingSenderId: "669839438046",
        appId: "1:669839438046:web:99d7103fd4da8815ecd24f",
        measurementId: "G-TQFL7L2KPH"
      };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let confirmados = new Set();
        const CONFIRMACOES_COLLECTION = "confirmados";

        // ============== FUNÇÕES FIREBASE ==============
        async function carregarConfirmados() {
            try {
                const snapshot = await db.collection(CONFIRMACOES_COLLECTION).get();
                confirmados.clear();
                snapshot.forEach(doc => confirmados.add(doc.id));
                console.log("✅ Confirmados carregados:", Array.from(confirmados));
            } catch (e) {
                console.error("Erro Firebase:", e);
            }
        }

        async function salvarConfirmacao(nomeNormalizado) {
            try {
                await db.collection(CONFIRMACOES_COLLECTION).doc(nomeNormalizado).set({
                    confirmadoEm: firebase.firestore.FieldValue.serverTimestamp()
                });
                return true;
            } catch (e) {
                console.error("Erro ao salvar:", e);
                return false;
            }
        }

        // ============== LISTA DE CONVIDADOS ==============
        const listaConvidados = [ /* ... mesma lista completa ... */ 
            "Danieli","Malu","Bruss","Gina","Abimael","Rafael","Filipe","Jeane","Gustavo","Giovanna",
            "Marianna (criança)","Edson","Kauan","Nelsina","Nino","Cleide","Miria","Bruno","Davi (criança)",
            "Cleuza","Jhulia","Jhonatan","Lucas","Adilson","Rosicler","Charles","Leandro","Tamires",
            "Isabela (criança)","Olívia (criança)","Zilda","José Paulo","Daiane","Fabiano","Miguel (criança)",
            "Alice (criança)","Jessica","José Augusto","Aldenir Luis","Manuel Santos","Susana","Isabelly",
            "Arthur","Ana Beatriz","Vitor","Stephani","Marcio","Guilherme","Regiane","Valdomiro","Elisson",
            "Jose","Noemy","Yngrid","Yasmin","Regiane","Diego","Elias","Jó","Mirella","Kethelyn",
            "Fabrício Petroceli","Alisson Cardeal","Lidiane","Andre","Karen","Kaio","Eidi","Henrique",
            "Miguel","Ana Veloso","Lara","Gabriela","Samuel","Erica","José Anchieta","Anderson","Ivete",
            "Marcos","Murillo","Leia","Ana Julia","Thiago","Luciene","Everton","Gabriel","Alice Abreu",
            "Mariah Abreu","Vania","Gabrielle","Fabricio","Evelyn","Daniel","Louise","Edmilson","Rachel",
            "Jessica","Alice","Maia","Alex","Yasmin","Kaun","Franciele","Giuliane","Maria Flor (criança)",
            "Filipi","Manuele","Priscila","Miguel","Giovana","Eloa","Edilza","Henrique","Eduarda Liz",
            "Jonatas","Teresa","Edinilza","Lorival","Edna","Edmilson Souza","Glaucia","Renan","Cecília",
            "Thomas","Beatriz lira","Carlos","Edvandro","Rose Silva","Alessandro","Daniel Sorana",
            "Danilo Sorana","Adriele","Heitor","Natan","Nathalia","Samira","Felipe Albuquerque","Carlinho",
            "Martha","Jonas","Claudia","Davi","Stefanie","Ana Clara","Isabela","Giulia","Terezinha",
            "Alisson","Clarinha","Nicolas"
        ].map(n => n.toUpperCase());

        const normalize = (s) => s.toString().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim().toUpperCase();

        const mensagensBase = [
            "Que bom saber que você vem — estamos contando os dias.",
            "Ansiosos para celebrar com você.",
            "Sua presença ilumina nosso grande dia.",
            "Obrigado por confirmar — te esperamos com carinho."
        ];
        const pickMsg = () => mensagensBase[Math.floor(Math.random() * mensagensBase.length)];

        // ============== ELEMENTOS ==============
        const input = document.getElementById('nomeInput');
        const ul = document.getElementById('sugestoesLista');
        const resultado = document.getElementById('resultado');
        const feedbackEnvio = document.getElementById('feedbackEnvio');
        const btnConfirmar = document.getElementById('btnConfirmar');

        const setInfo = (msg) => { resultado.style.color = '#222'; resultado.textContent = msg; };
        const setWarn = (msg) => { resultado.style.color = '#d9534f'; resultado.textContent = msg; };

        // ============== SUGESTÕES ==============
        function renderSugestoes(query) {
            const q = normalize(query);
            const resultados = q ? listaConvidados.filter(n => normalize(n).startsWith(q)) : [];
            
            ul.innerHTML = resultados.map(nome => {
                const isConf = confirmados.has(normalize(nome));
                const style = isConf ? 'color:#777;text-decoration:line-through;opacity:.75;' : '';
                return `<li data-nome="${nome}" style="padding:12px; cursor:pointer; ${style}">${nome}</li>`;
            }).join('');

            ul.style.display = resultados.length ? 'block' : 'none';
        }

        ul.addEventListener('click', e => {
            const li = e.target.closest('li');
            if (li) {
                input.value = li.dataset.nome;
                ul.style.display = 'none';
            }
        });

        document.addEventListener('click', e => {
            if (!e.target.closest('.mx-auto')) ul.style.display = 'none';
        });

        input.addEventListener('input', () => renderSugestoes(input.value));

        // ============== BOTÃO CONFIRMAR (principal correção) ==============
        btnConfirmar.addEventListener('click', async () => {
            const nome = input.value.trim().toUpperCase();
            
            if (!nome) {
                setWarn('Por favor, digite seu nome.');
                return;
            }
            if (!listaConvidados.includes(nome)) {
                setWarn('Nome não encontrado na lista.');
                return;
            }

            const nomeNormalizado = normalize(nome);

            try {
                await salvarConfirmacao(nomeNormalizado);
                confirmados.add(nomeNormalizado);

                setInfo('Presença confirmada com sucesso! 🎉');
                
                document.getElementById('modalNome').textContent = nome;
                document.getElementById('modalMensagem').textContent = pickMsg();
                
                const modal = new bootstrap.Modal(document.getElementById('confirmModal'));
                modal.show();

                startConfetti(1400);
                renderSugestoes(input.value);

                enviarEmailConfirmacao(nome)
                    .then(() => feedbackEnvio.textContent = '✅ Confirmação enviada para a noiva.')
                    .catch(() => feedbackEnvio.textContent = '⚠️ Email não enviado, mas presença confirmada.');

            } catch (err) {
                console.error(err);
                setWarn('Erro ao confirmar. Tente novamente.');
            }
        });

        // ============== CONFETTI (mesmo de antes) ==============
        const confettiCanvas = document.getElementById('confettiCanvas');
        const ctx = confettiCanvas.getContext('2d');
        let confettiParticles = [];
        let rafId = null;

        function resizeCanvas() {
            confettiCanvas.width = window.innerWidth;
            confettiCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function createConfetti() {
            const colors = ['#b498ee', '#7965a5', '#cfc6e9', '#d7d0ec'];
            confettiParticles = Array.from({ length: 150 }, () => ({
                x: Math.random() * confettiCanvas.width,
                y: Math.random() * confettiCanvas.height - 100,
                r: 2 + Math.random() * 4,
                c: colors[Math.floor(Math.random() * colors.length)],
                s: 1 + Math.random() * 3,
                a: Math.random() * Math.PI * 2,
                va: 0.02 + Math.random() * 0.05
            }));
        }

        function drawConfetti() {
            ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
            confettiParticles.forEach(p => {
                p.y += p.s;
                p.x += Math.sin(p.a) * 1.2;
                p.a += p.va;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = p.c;
                ctx.fill();
            });
            confettiParticles = confettiParticles.filter(p => p.y < confettiCanvas.height);
            if (confettiParticles.length > 0) rafId = requestAnimationFrame(drawConfetti);
        }

        function startConfetti() {
            confettiCanvas.style.display = 'block';
            createConfetti();
            drawConfetti();
            setTimeout(() => {
                cancelAnimationFrame(rafId);
                confettiCanvas.style.display = 'none';
            }, 1400);
        }

        // Carregar confirmados
        window.addEventListener('load', carregarConfirmados);

        // ============== ENVIAR EMAIL ==============
        async function enviarEmailConfirmacao(nomeConvidado) {
            const params = {
                convidado: nomeConvidado,
                status: "Confirmado",
                para_email: "confrimacaolayane@gmail.com",
                data: new Date().toLocaleString('pt-BR')
            };
            try {
                await emailjs.send("service_yhqj17q", "template_w4dokuj", params);
                console.log("Email enviado");
            } catch (e) {
                console.error("Erro email:", e);
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
