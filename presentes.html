// ==================== LOCALSTORAGE DOS PRESENTES (CORRIGIDO) ====================
let presentesPresenteados = [];

function carregarPresentesSalvos() {
    try {
        const salvos = localStorage.getItem('presentesPresenteados');
        if (salvos) {
            presentesPresenteados = JSON.parse(salvos);
            console.log("✅ Presentes carregados:", presentesPresenteados);
        } else {
            console.log("ℹ️ Nenhum presente marcado ainda.");
        }
    } catch (e) {
        console.error("❌ Erro ao carregar presentes:", e);
        presentesPresenteados = [];
    }
}

function salvarPresentes() {
    try {
        localStorage.setItem('presentesPresenteados', JSON.stringify(presentesPresenteados));
        console.log("💾 Presentes salvos com sucesso:", presentesPresenteados);
    } catch (e) {
        console.error("❌ Erro ao salvar presentes:", e);
    }
}

// Carrega ao iniciar

    {id:15, area:"Geral", categoria:"Contribuição", nome:"Presente em Dinheiro", isMoney:true, desc:"Para ajudar nas despesas da casa, viagem de lua de mel ou primeira compra.", preco:"Qualquer valor", img:"/assets/images/prewedding/pre27.JPG"}
];

// ==================== CONFETES ROXOS ====================
function launchConfetti() {
    const colors = ['#b498ee', '#9F7AEA', '#7965a5', '#d4b3ff'];
    const duration = 1800;
    const end = Date.now() + duration;

    const frame = () => {
        confetti({
            particleCount: 8,
            angle: 60,
            spread: 55,
            origin: { x: 0 },
            colors: colors
        });
        confetti({
            particleCount: 8,
            angle: 120,
            spread: 55,
            origin: { x: 1 },
            colors: colors
        });

        if (Date.now() < end) requestAnimationFrame(frame);
    };
    frame();
}

// ==================== RENDERIZAÇÃO ====================
const areaMenu = document.getElementById('areaMenu');
areaMenu.innerHTML = `
    <li class="nav-item"><button class="nav-link nav-area active" data-area="Todos"><i class="fas fa-th-large"></i> Todos</button></li>
    <li class="nav-item"><button class="nav-link nav-area" data-area="Cozinha"><i class="fas fa-utensils"></i> Cozinha</button></li>
    <li class="nav-item"><button class="nav-link nav-area" data-area="Área de Serviço"><i class="fas fa-tshirt"></i> Área de Serviço</button></li>
    <li class="nav-item"><button class="nav-link nav-area" data-area="Geral"><i class="fas fa-gift"></i> Geral</button></li>
`;

// Lógica dos menus
document.querySelectorAll('.nav-area').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.nav-area').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const area = btn.dataset.area;
        if (area === "Todos") {
            document.getElementById('subMenu').style.display = 'none';
            renderCards();
        } else {
            renderSubMenu(area);
            renderCards(area);
        }
    });
});

function renderSubMenu(area) {
    const subMenu = document.getElementById('subMenu');
    subMenu.innerHTML = '';
    subMenu.style.display = 'flex';

    if (area === "Cozinha") {
        ["Eletrodomésticos", "Utensílios"].forEach(cat => {
            const li = document.createElement('li');
            li.className = 'nav-item';
            li.innerHTML = `<button class="nav-link nav-sub" data-area="${area}" data-cat="${cat}">${cat}</button>`;
            subMenu.appendChild(li);
        });
    } else if (area === "Área de Serviço") {
        const li = document.createElement('li');
        li.className = 'nav-item';
        li.innerHTML = `<button class="nav-link nav-sub active" data-area="${area}" data-cat="Eletrodomésticos">Eletrodomésticos</button>`;
        subMenu.appendChild(li);
    }

    document.querySelectorAll('.nav-sub').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.nav-sub').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderCards(btn.dataset.area, btn.dataset.cat);
        });
    });
}

function renderCards(area = null, categoria = null) {
    const container = document.getElementById('presentesContainer');
    container.innerHTML = '';

    let filtrados = (area && area !== "Todos") ? presentes.filter(p => p.area === area) : presentes;
    if (categoria) filtrados = filtrados.filter(p => p.categoria === categoria);

    filtrados.forEach(item => {
        const isPresenteado = presentesPresenteados.includes(item.id);
        let badgeClass = item.categoria === "Utensílios" ? "badge-utensilios" : 
                        item.categoria === "Eletrodomésticos" ? "badge-eletro" : "badge-moveis";

        const cardHTML = `
            <div class="col-md-6 col-lg-4 mb-4">
                <div class="card gift-card ${isPresenteado ? 'presenteado' : ''}" data-id="${item.id}">
                    <div class="image-container">
                        <img src="${item.img}" alt="${item.nome}">
                    </div>
                    <div class="card-body d-flex flex-column">
                        <span class="badge ${badgeClass} mb-3">${item.categoria}</span>
                        <h5 class="card-title mb-3">${item.nome}</h5>
                        <p class="card-text flex-grow-1">${item.desc}</p>
                        <p class="fw-bold text-success fs-4 mb-3">${item.preco}</p>
                        <button class="btn btn-confirm confirmar-btn" data-id="${item.id}" ${isPresenteado ? 'disabled' : ''}>
                            ${isPresenteado ? 'Já Presenteado' : 'Escolher este presente'}
                        </button>
                    </div>
                </div>
            </div>`;
        container.innerHTML += cardHTML;
    });
};

// Modal + Confirmação
let presenteAtual = null;

document.addEventListener('click', e => {
    if (e.target.classList.contains('confirmar-btn') && !e.target.disabled) {
        const id = parseInt(e.target.dataset.id);
        presenteAtual = presentes.find(p => p.id === id);

        document.getElementById('modalTitle').textContent = presenteAtual.nome;
        document.getElementById('modalDescricao').textContent = presenteAtual.desc + " — " + presenteAtual.preco;

        new bootstrap.Modal(document.getElementById('confirmModal')).show();
    }
});

document.getElementById('btnConfirmarFinal').addEventListener('click', () => {
    const nome = document.getElementById('nomePresenteador').value.trim();
    if (!nome) return alert("Por favor, informe seu nome.");

    const isMoneyGift = presenteAtual.isMoney;

    if (!isMoneyGift) {
        presentesPresenteados.push(presenteAtual.id);
        salvarPresentes();   // ← Salva corretamente

        emailjs.send("service_yhqj17q", "template_3s7i01e", {
            convidado: nome,
            presente: presenteAtual.nome,
            status: "Confirmado"
        });

        launchConfetti();
        alert(`🎉 Obrigado, ${nome}!\n\nSua confirmação de ${presenteAtual.nome} foi registrada com carinho!`);
    } else {
        alert(`💜 Obrigado, ${nome}!\n\nVocê será redirecionado para o PIX do casal.`);
        window.open("https://seu-link-do-pix-aqui", "_blank");
    }

    bootstrap.Modal.getInstance(document.getElementById('confirmModal')).hide();
    renderCards();
});

renderCards();
</script>

<script>
// Animação suave staggered com Intersection Observer
const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry, index) => {
        if (entry.isIntersecting) {
            setTimeout(() => {
                entry.target.classList.add('visible');
            }, index * 150);
        }
    });
}, {
    threshold: 0.15,
    rootMargin: "0px 0px -50px 0px"
});

document.querySelectorAll('.animate-on-scroll').forEach(el => {
    observer.observe(el);
});
</script>
